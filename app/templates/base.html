<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Data Insight Assistant{% endblock %}</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Phosphor Icons (Modern icon set) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6', // blue-500
                        'primary-hover': '#2563eb', // blue-600
                        accent: '#06b6d4', // cyan-500
                        'accent-hover': '#0891b2', // cyan-600
                        dark: {
                            bg: '#0f172a', // slate-900
                            card: '#1e293b', // slate-800
                            border: '#334155' // slate-700
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body
    class="bg-dark-bg text-slate-200 font-sans min-h-screen flex flex-col antialiased selection:bg-primary selection:text-white">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass-nav border-b border-dark-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo & Title -->
                <div class="flex-shrink-0 flex items-center gap-3 cursor-pointer group">
                    <div
                        class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center shadow-lg shadow-primary/30 group-hover:shadow-primary/50 transition-all duration-300">
                        <i class="ph ph-chart-line-up text-white text-xl"></i>
                    </div>
                    <span
                        class="font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                        DataSight AI
                    </span>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        {% set endpoint = request.endpoint %}
                        <a href="{{ url_for('views.index') }}"
                            class="{% if endpoint == 'views.index' %}bg-dark-card/50 text-white border border-dark-border{% else %}text-slate-300 hover:text-white hover:bg-dark-card border border-transparent{% endif %} px-3 py-2 rounded-md text-sm font-medium transition-colors">Dashboard</a>
                        <a href="{{ url_for('views.history') }}"
                            class="{% if endpoint == 'views.history' %}bg-dark-card/50 text-white border border-dark-border{% else %}text-slate-300 hover:text-white hover:bg-dark-card border border-transparent{% endif %} px-3 py-2 rounded-md text-sm font-medium transition-colors">History</a>
                        <a href="{{ url_for('views.settings') }}"
                            class="{% if endpoint == 'views.settings' %}bg-dark-card/50 text-white border border-dark-border{% else %}text-slate-300 hover:text-white hover:bg-dark-card border border-transparent{% endif %} px-3 py-2 rounded-md text-sm font-medium transition-colors">Settings</a>
                        <a href="{{ url_for('views.about') }}"
                            class="{% if endpoint == 'views.about' %}bg-dark-card/50 text-white border border-dark-border{% else %}text-slate-300 hover:text-white hover:bg-dark-card border border-transparent{% endif %} px-3 py-2 rounded-md text-sm font-medium transition-colors">About</a>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div class="md:hidden hidden bg-dark-bg border-b border-dark-border pb-3 px-4 shadow-lg absolute w-full left-0 top-16" id="mobile-menu">
            <div class="flex flex-col space-y-2 mt-2">
                {% set endpoint = request.endpoint %}
                <a href="{{ url_for('views.index') }}" class="{% if endpoint == 'views.index' %}bg-dark-card/50 text-white{% else %}text-slate-300 hover:text-white hover:bg-dark-card{% endif %} px-3 py-2 rounded-md text-base font-medium">Dashboard</a>
                <a href="{{ url_for('views.history') }}" class="{% if endpoint == 'views.history' %}bg-dark-card/50 text-white{% else %}text-slate-300 hover:text-white hover:bg-dark-card{% endif %} px-3 py-2 rounded-md text-base font-medium">History</a>
                <a href="{{ url_for('views.settings') }}" class="{% if endpoint == 'views.settings' %}bg-dark-card/50 text-white{% else %}text-slate-300 hover:text-white hover:bg-dark-card{% endif %} px-3 py-2 rounded-md text-base font-medium">Settings</a>
                <a href="{{ url_for('views.about') }}" class="{% if endpoint == 'views.about' %}bg-dark-card/50 text-white{% else %}text-slate-300 hover:text-white hover:bg-dark-card{% endif %} px-3 py-2 rounded-md text-base font-medium">About</a>
            </div>
        </div>
    </nav>

    <!-- Flash Messages Placeholder -->
    <div id="flash-container" class="fixed top-20 right-4 z-50 flex flex-col gap-2 max-w-sm w-full">
        <!-- JS will inject alerts here -->
    </div>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-dark-border bg-dark-bg/80 py-6 mt-auto">
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-slate-400">
            <p>&copy; 2026 DataSight AI. All rights reserved.</p>
            <div class="flex gap-4">
                <a href="#" class="hover:text-primary transition-colors">Privacy Policy</a>
                <a href="#" class="hover:text-primary transition-colors">Terms of Service</a>
                <a href="#" class="hover:text-white transition-colors"><i class="ph ph-github-logo text-xl"></i></a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/session.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v=1.1"></script>
    <script>
        // Mobile Menu Toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
            } else {
                menu.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
